<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fluxion MVP</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #020617; color: white; }
      main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
      #stage { aspect-ratio: 16 / 9; border: 1px solid #334155; border-radius: 12px; overflow: hidden; }
      button { margin-top: 16px; padding: 8px 14px; border-radius: 8px; border: 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>Fluxion MVP</h1>
      <div id="stage"></div>
      <button id="play">Play</button>
    </main>
    <script type="module">
      import { mountFluxion } from "./dist/index.js";
      const player = await mountFluxion(document.querySelector("#stage"), "../examples/simple_circle.vanim.json");
      document.querySelector("#play").addEventListener("click", () => player.play());
    </script>
  </body>
</html>
