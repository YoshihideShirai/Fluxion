<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fluxion Text DSL</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #111827; color: #f8fafc; }
      main { max-width: 1180px; margin: 24px auto; padding: 0 16px 32px; }
      h1 { margin: 0 0 16px; font-size: 28px; font-weight: 700; }
      .workspace { display: grid; grid-template-columns: minmax(320px, 420px) minmax(0, 1fr); gap: 16px; align-items: start; }
      .editor, .preview { min-width: 0; }
      .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
      label { display: block; margin-bottom: 8px; color: #cbd5e1; font-size: 14px; font-weight: 600; }
      .toolbar label { margin: 0; }
      textarea {
        width: 100%;
        min-height: 420px;
        resize: vertical;
        padding: 12px;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #020617;
        color: #e2e8f0;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      #stage { aspect-ratio: 16 / 9; border: 1px solid #475569; border-radius: 8px; overflow: hidden; background: #0f172a; }
      .controls { display: flex; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
      button { padding: 8px 14px; border-radius: 8px; border: 0; background: #38bdf8; color: #082f49; font-weight: 700; cursor: pointer; }
      button.secondary { background: #334155; color: #f8fafc; }
      button:disabled { cursor: not-allowed; opacity: 0.55; }
      .switch { display: inline-flex; align-items: center; gap: 6px; color: #cbd5e1; font-size: 13px; font-weight: 500; }
      .switch input { width: 16px; height: 16px; accent-color: #38bdf8; }
      .timebar { display: grid; grid-template-columns: minmax(0, 1fr) 84px; gap: 10px; align-items: center; width: 100%; }
      input[type="range"] { width: 100%; accent-color: #38bdf8; }
      #time-readout { color: #cbd5e1; font: 13px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; text-align: right; }
      #status { min-height: 22px; color: #cbd5e1; font-size: 14px; }
      #status.error { color: #fca5a5; }
      details { margin-top: 12px; border: 1px solid #334155; border-radius: 8px; background: #020617; }
      summary { cursor: pointer; padding: 10px 12px; color: #cbd5e1; font-size: 14px; font-weight: 600; }
      pre { max-height: 260px; margin: 0; overflow: auto; border-top: 1px solid #334155; padding: 12px; color: #cbd5e1; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      @media (max-width: 820px) {
        .workspace { grid-template-columns: 1fr; }
        textarea { min-height: 280px; }
        .toolbar { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fluxion Text DSL</h1>
      <div class="workspace">
        <section class="editor">
          <div class="toolbar">
            <label for="dsl">Text DSL</label>
            <label class="switch"><input id="live-compile" type="checkbox" checked />Live compile</label>
          </div>
          <textarea id="dsl" spellcheck="false">scene width=1280 height=720 fps=60

text title "Fluxion MVP" at 640,110 size=32 fill="#e2e8f0"
circle c1 r=48 at 220,360 fill="#38bdf8" stroke="#0f172a" strokeWidth=4
rect box w=120 h=80 at 640,360 fill="#f97316" stroke="#111827" strokeWidth=2

at 0s:
  show title
  show c1
  show box

animate c1.x from 220 to 640 duration=1.5s easing=easeInOut
animate c1.y from 360 to 360 duration=1.5s easing=easeInOut
animate box.opacity from 1 to 0.35 duration=1.5s easing=easeInOut
animate c1.x from 640 to 980 start=1.5s duration=1.5s easing=easeInOut
animate c1.y from 360 to 360 start=1.5s duration=1.5s easing=easeInOut
animate c1.scale from 1 to 1.4 start=1.5s duration=1.5s easing=easeInOut</textarea>
          <div class="controls">
            <button id="compile">Compile</button>
            <button id="load-example" class="secondary">Load JSON Example</button>
          </div>
        </section>
        <section class="preview">
          <label>Preview</label>
          <div id="stage"></div>
          <div class="controls">
            <button id="play">Play</button>
            <button id="stop" class="secondary">Stop</button>
            <button id="reset" class="secondary">Reset</button>
            <div class="timebar">
              <input id="scrubber" type="range" min="0" max="0" step="0.01" value="0" />
              <span id="time-readout">0.00 / 0.00</span>
            </div>
            <span id="status" aria-live="polite"></span>
          </div>
          <details>
            <summary>Generated .vanim.json</summary>
            <pre id="json-output"></pre>
          </details>
        </section>
      </div>
    </main>
    <script type="module">
      import { mountFluxion, mountFluxionDocument } from "./dist/index.js";
      import { compileTextDsl } from "./dist/dsl/compiler.js";

      const stage = document.querySelector("#stage");
      const input = document.querySelector("#dsl");
      const status = document.querySelector("#status");
      const liveCompile = document.querySelector("#live-compile");
      const playButton = document.querySelector("#play");
      const stopButton = document.querySelector("#stop");
      const resetButton = document.querySelector("#reset");
      const scrubber = document.querySelector("#scrubber");
      const timeReadout = document.querySelector("#time-readout");
      const jsonOutput = document.querySelector("#json-output");
      let documentData = compileTextDsl(input.value);
      let player = mountFluxionDocument(stage, documentData);
      let compileTimer = 0;
      let isPlaying = false;

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      function formatSeconds(seconds) {
        return seconds.toFixed(2);
      }

      function updateTransport(seconds = player.currentSeconds) {
        const duration = player.durationSeconds;
        scrubber.max = String(duration);
        scrubber.value = String(Math.min(seconds, duration));
        timeReadout.textContent = `${formatSeconds(Math.min(seconds, duration))} / ${formatSeconds(duration)}`;
        playButton.disabled = isPlaying || duration === 0;
        stopButton.disabled = !isPlaying;
        resetButton.disabled = duration === 0 && player.currentSeconds === 0;
      }

      function updateJsonOutput(data) {
        jsonOutput.textContent = data ? JSON.stringify(data, null, 2) : "";
      }

      function compileCurrentInput() {
        try {
          player.stop();
          isPlaying = false;
          documentData = compileTextDsl(input.value);
          player = mountFluxionDocument(stage, documentData);
          updateTransport(0);
          updateJsonOutput(documentData);
          setStatus(`Compiled ${documentData.nodes.length} nodes, ${documentData.timeline.length} operations`);
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), true);
        }
      }

      function scheduleCompile() {
        if (!liveCompile.checked) return;
        clearTimeout(compileTimer);
        compileTimer = setTimeout(compileCurrentInput, 250);
      }

      function stopPlayback() {
        player.stop();
        isPlaying = false;
        updateTransport();
      }

      function resetPlayback() {
        stopPlayback();
        player.seek(0);
        updateTransport(0);
      }

      document.querySelector("#compile").addEventListener("click", compileCurrentInput);

      document.querySelector("#load-example").addEventListener("click", async () => {
        try {
          player.stop();
          isPlaying = false;
          player = await mountFluxion(stage, "../examples/simple_circle.vanim.json");
          documentData = null;
          updateTransport(0);
          updateJsonOutput(null);
          setStatus("Loaded JSON example");
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), true);
        }
      });

      playButton.addEventListener("click", () => {
        isPlaying = true;
        player.play({
          from: player.currentSeconds >= player.durationSeconds ? 0 : player.currentSeconds,
          onTick: updateTransport,
          onStop: () => {
            isPlaying = false;
            updateTransport();
          },
        });
        updateTransport();
      });
      stopButton.addEventListener("click", stopPlayback);
      resetButton.addEventListener("click", resetPlayback);
      scrubber.addEventListener("input", () => {
        stopPlayback();
        player.seek(Number(scrubber.value));
        updateTransport();
      });
      input.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") compileCurrentInput();
      });
      input.addEventListener("input", scheduleCompile);
      updateTransport(0);
      updateJsonOutput(documentData);
      setStatus(`Compiled ${documentData.nodes.length} nodes, ${documentData.timeline.length} operations`);
    </script>
  </body>
</html>
